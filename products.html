<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Just Bags | Products</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="topbar" style="background:linear-gradient(180deg,#325726,#284920);color:#eef4e4">
      <div class="brandmark"><img src="logo.png" alt="Just Bags logo"></div>
      <nav class="nav" style="color:#eef4e4">
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a class="active" href="products.html">Products</a>
        <a href="contact.html">Contact Us</a>
      </nav>
      <div class="iconrow"><span>✉</span><span class="iconbubble" style="border-color:#dbe6ce;color:#eef4e4">◌</span></div>
    </header>

    <section class="section-page">
      <div class="centerhead">
        <div class="divider"></div>
        <h1>Our Products</h1>
        <p>Eco-Friendly Jute Bags for Every Need.</p>
      </div>
      <div class="product-grid">
        <article class="product-card">
          <div class="product-image">
            <div class="table"></div>
            <div class="bagcard"><div class="bag-green"></div></div>
          </div>
          <div class="product-copy">
            <h3>Shopping Bags</h3>
            <a href="contact.html">View Category →</a>
          </div>
        </article>

        <article class="product-card">
          <div class="product-image" style="background:linear-gradient(180deg, rgba(255,255,255,.26), rgba(255,255,255,.06)),linear-gradient(180deg, #8ca956 0%, #bfd39a 28%, #e6edd9 100%);">
            <div class="table"></div>
            <div class="bagcard"></div>
          </div>
          <div class="product-copy">
            <h3>Promotional Bags</h3>
            <a href="contact.html">View Category →</a>
          </div>
        </article>

        <article class="product-card">
          <div class="product-image" style="background:linear-gradient(180deg, rgba(255,255,255,.26), rgba(255,255,255,.06)),linear-gradient(180deg, #9ab163 0%, #c6d8a2 28%, #ebf1df 100%);">
            <div class="table"></div>
            <div class="bagcard" style="width:124px;height:146px"></div>
          </div>
          <div class="product-copy">
            <h3>Gift Bags</h3>
            <a href="contact.html">View Category →</a>
          </div>
        </article>

        <article class="product-card">
          <div class="product-image" style="background:linear-gradient(180deg, rgba(255,255,255,.26), rgba(255,255,255,.06)),linear-gradient(180deg, #6d9041 0%, #a7c37a 28%, #e8efe0 100%);">
            <div class="table"></div>
            <div class="bagcard" style="width:136px;height:154px;background:linear-gradient(180deg,#e3d3ba,#c6a982)"></div>
          </div>
          <div class="product-copy">
            <h3>Custom Orders</h3>
            <a href="contact.html">View Category →</a>
          </div>
        </article>
      </div>
    </section>
  </div>
  <div class="footer-note">Open each navigation link to see a separate page.</div>

</html>
